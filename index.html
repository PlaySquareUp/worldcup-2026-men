<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>SQUAREUP: 2026 World Cup Edition</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --bg: #ffffff;             /* Darkest Value (Inverted Base) */         
            --border: #7d39eb;         /* Neon Purple Accent */        
            --text-main: #000000;      /* Lightest Value (Inverted Core Text) */     
            --text-muted: #7d39eb;    
            --square-bg: #000000;     
            --square-hover: #1a1a1a;  
            --square-selected: #7d39eb; 
            --free-space: #1a1a1a;    
            --accent: #7d39eb;
            --error: #e53e3e;
        }

        html, body { margin: 0; padding: 0; background-color: var(--bg); overflow-x: hidden; }
        body {
            font-family: 'DM Sans', sans-serif;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* Profile Header Row Identity Layer */
        .profile-row {
            width: 100%;
            max-width: 460px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .user-badge {
            background: #000000;
            color: #ffffff;
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid var(--accent);
        }
        .auth-trigger-btn {
            color: var(--accent);
            text-decoration: underline;
            cursor: pointer;
        }

        h1, h2, h3, .heading-font { 
            font-family: 'Space Grotesk', sans-serif; 
            font-weight: 700;
            letter-spacing: -0.5px; 
        }
        
        h1 { 
            font-size: 2.1rem; 
            margin: 5px 0 2px 0; 
            text-align: center; 
            color: var(--text-main); 
        }
        p.subtitle { font-size: 0.9rem; margin: 0 0 16px 0; color: var(--accent); font-weight: 700; text-align: center; max-width: 460px; line-height: 1.3; }

        .widget-box {
            background: #000000; padding: 16px; border-radius: 12px;
            border: 2px solid var(--text-main);
            margin-bottom: 16px;
            width: 100%; max-width: 460px; box-sizing: border-box;
            color: #ffffff;
        }

        .input-group { margin-bottom: 12px; text-align: left; }
        .input-group label { display: block; margin-bottom: 4px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #ffffff; }
        .input-group input, .input-group select {
            width: 100%; padding: 10px; border: 2px solid var(--accent); border-radius: 6px;
            font-family: 'DM Sans', sans-serif; box-sizing: border-box; font-size: 1rem; background-color: #1a1a1a;
            color: #ffffff;
        }
        .input-group input:focus { outline: none; border-color: #ffffff; background-color: #000000; }

        /* Custom Toggle Switch Component */
        .toggle-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            background: #1a1a1a;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #333;
        }
        .toggle-label { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; color: #ffffff; }
        .switch {
            position: relative; display: inline-block; width: 44px; height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333; transition: .3s; border-radius: 24px;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px;
            background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); }

        .auth-toggle { font-size: 0.85rem; color: var(--accent); cursor: pointer; text-decoration: underline; margin-top: 10px; display: inline-block; font-weight: 700; }
        .error-message { color: var(--error); font-size: 0.85rem; margin-top: 5px; display: none; font-weight: 500; }

        .tabs-container {
            display: flex; gap: 8px; width: 100%; max-width: 460px; 
            overflow-x: auto; margin-bottom: 16px; padding: 4px 2px 6px 2px;
            scrollbar-width: thin; -webkit-overflow-scrolling: touch;
        }
        .tabs-container::-webkit-scrollbar { height: 4px; }
        .tabs-container::-webkit-scrollbar-thumb { background-color: var(--accent); border-radius: 10px; }

        .tab-button {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 6px 12px; background: #000000; border: 2px solid var(--accent); border-radius: 20px;
            font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 0.8rem;
            cursor: pointer; white-space: nowrap; color: #ffffff; transition: all 0.2s;
        }
        .tab-button.active { background: var(--accent); color: #ffffff; border-color: var(--accent); box-shadow: 0 0 10px rgba(125, 57, 235, 0.6); }
        
        .delete-card-btn {
            background: rgba(255,255,255,0.2); border: none; border-radius: 50%;
            width: 16px; height: 16px; display: flex; align-items: center; justify-content: center;
            font-size: 10px; color: #ffffff; cursor: pointer; font-weight: 700; padding: 0;
        }
        .delete-card-btn:hover { background: var(--error) !important; color: white !important; }

        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; width: 100%; max-width: 460px; margin: 0 auto 16px auto; }
        
        /* Spring-Popping Physical Grid Tiles */
        .square {
            background-color: var(--square-bg); border: 2px solid #ffffff; border-radius: 8px;
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            font-size: 0.72rem; font-weight: 700; line-height: 1.2; padding: 4px; cursor: pointer; box-sizing: border-box;
            color: #ffffff; text-align: center; word-wrap: break-word; overflow: hidden;
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.2s;
        }
        .square:active { transform: scale(0.92); }
        .square.selected { background-color: var(--accent); color: white; border-color: var(--accent); text-decoration: line-through; transform: scale(1.02); }
        .square.free-space { background-color: var(--free-space); border-color: var(--accent); color: var(--accent); }

        /* Dynamic Scoreboard Row Notification Flashers */
        .history-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #333; font-size: 0.9rem; align-items: center; color: #ffffff; transition: background-color 0.3s ease; }
        .history-item.flash-active { background-color: rgba(125, 57, 235, 0.3); }
        
        .history-item.stale-card { opacity: 0.4; filter: grayscale(50%); }
        .badge { background: #333333; padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; color: #ffffff; }
        .badge.win { background: var(--accent); color: #ffffff; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 2000;
            opacity: 0; visibility: hidden; transition: all 0.25s ease;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal { background: #000000; border: 3px solid var(--accent); padding: 24px; border-radius: 16px; text-align: center; width: 85%; max-width: 380px; color: #ffffff; }
    </style>
</head>
<body>

    <div class="profile-row">
        <div>Player Name: <span id="identity-status-label" class="user-badge">Guest Player</span></div>
        <div id="auth-header-action" class="auth-trigger-btn" onclick="openAuthModal()">Login / Sign Up</div>
    </div>

    <h1>PREPARE THE SQUARES!</h1>
    <p class="subtitle">Find the game, get your card, and start squaring!</p>

    <div class="widget-box" id="setup-card">
        <h3 style="margin-top: 0; font-size: 1.3rem; color: #ffffff;">GENERATE MATCH CARD</h3>
        <div style="display: flex; gap: 10px;">
            <div class="input-group" style="flex: 1;">
                <label>Team 1</label>
                <select id="team-1"></select>
            </div>
            <div class="input-group" style="flex: 1;">
                <label>Team 2</label>
                <select id="team-2"></select>
            </div>
        </div>
        
        <div class="toggle-group">
            <span class="toggle-label
